name: Publish container image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without a leading v
        required: true
        default: "0.1.0"
        type: string
      source_ref:
        description: Immutable Git tag or commit to build
        required: true
        default: "v0.1.0"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Resolve source revision
        id: source
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ inputs.version }}
            REVISION=${{ steps.source.outputs.revision }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/printvault:${{ inputs.version }}
            ghcr.io/${{ github.repository_owner }}/printvault:latest
